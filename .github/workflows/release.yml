name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # Release tags must pass the same checks as regular CI.
      - run: cargo fmt-check
      - run: cargo typecheck
      - run: cargo lint
      - run: cargo qa
      - run: cargo package-check

  publish-crate:
    name: Publish to crates.io
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Requires repository secret CARGO_REGISTRY_TOKEN from crates.io.
      - run: cargo publish --locked --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  create-release:
    name: Create GitHub Release
    needs: publish-crate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # Creates the Release object for the pushed tag. Asset jobs upload into it.
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    name: Build ${{ matrix.target }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: macos-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: windows-x86_64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      # Builds release binary and uploads a user-facing archive name.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: pytree
          target: ${{ matrix.target }}
          archive: pytree-${{ github.ref_name }}-${{ matrix.suffix }}
          locked: true
          include: LICENSE,README.md
          tar: unix
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}
